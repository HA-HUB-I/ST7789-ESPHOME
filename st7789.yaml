# GPIO | Използване
# GPIO4 | backlight_pwm (LED)
# GPIO5 | SPI CS
# GPIO13 | buzzer
# GPIO18 | SPI CLK
# GPIO19 | SPI DC
# GPIO21 | SPI RESET
# GPIO23 | SPI MOSI
# GPIO32 | GREEN LED
# GPIO33 | RED LED


