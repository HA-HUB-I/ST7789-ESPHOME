# PIR sensor
  - platform: gpio
    name: "PIR RAW"
    id: pir_raw
    pin:
      number: GPIO25
      mode: INPUT_PULLDOWN
    internal: true
    on_press:
      then:
        - globals.set:
            id: pir_detected
            value: 'true'
        - binary_sensor.template.publish:
            id: pir_stable
            state: ON
        - delay: 10s
        - binary_sensor.template.publish:
            id: pir_stable
            state: OFF
    on_release:
      then:
        - globals.set:
            id: pir_detected
            value: 'false'

  - platform: template
    name: "PIR Motion Stable"
    id: pir_stable
    device_class: motion

    
  - platform: homeassistant
    id: door_contact
    entity_id: binary_sensor.d1mini_sboard_door_contact_2
    name: "Door Contact"
    internal: False

