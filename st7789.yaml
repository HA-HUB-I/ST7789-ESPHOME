output:
  - platform: ledc
    pin: GPIO4
    id: backlight_pwm

  - platform: ledc
    pin: GPIO33 #RED
    id: red_led

  - platform: ledc
    pin: GPIO32 #GREEN
    id: green_led

  - platform: ledc
    pin: GPIO13
    id: buzzer_output
    frequency: 2730Hz # Using a frequency that's good for audible beeps
    inverted: true

script:
  - id: buzzer_five # Use the same buzzer name you have given above.
    then:
      - repeat:
          count: 5
          then:
            - output.set_level:
                id: buzzer_output
                level: "50%"
            - delay: 500ms
            - output.turn_off: buzzer_output
            - delay: 1000ms

  - id: door_unlocked_sound
    then:
      - output.set_level:
          id: buzzer_output
          level: "50%"
      - delay: 200ms
      - output.turn_off: buzzer_output
      - delay: 100ms
      - output.set_level:
          id: buzzer_output
          level: "50%"
      - delay: 200ms
      - output.turn_off: buzzer_output

  - id: error_sound
    then:
      - output.set_level:
          id: buzzer_output
          level: "50%"
      - delay: 100ms
      - output.turn_off: buzzer_output
      - delay: 100ms
      - output.set_level:
          id: buzzer_output
          level: "50%"
      - delay: 100ms
      - output.turn_off: buzzer_output
      - delay: 100ms
      - output.set_level:
          id: buzzer_output
          level: "50%"
      - delay: 100ms
      - output.turn_off: buzzer_output

