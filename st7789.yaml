qr_code:
  - id: qr_code_unlck
    value: unclk.app
display:
  - platform: ili9xxx
    model: ST7789V
    dimensions:
      height: 170
      width: 320
      offset_height: 35
      offset_width: 0
    transform:
      swap_xy: true
      mirror_x: false
      mirror_y: true
    color_order: bgr
    invert_colors: true
    cs_pin: GPIO5
    dc_pin: GPIO19
    reset_pin: GPIO21
    data_rate: 40MHz
    id: displayST
    pages:
      - id: page0
        lambda: |-
          // Горна лента за време
          it.rectangle(0, 0, 320, 25, Color(5, 10, 20));
          it.strftime(160, 5, id(font_16), Color(240, 248, 255), TextAlign::CENTER, "%H:%M", id(ha_time).now());
          
          // ТЕМПЕРАТУРА - ЛЯВО
          it.printf(80, 60, id(font_bold), Color(255, 180, 0), TextAlign::CENTER, "%.1f°", id(weather).state);
          it.printf(80, 110, id(font_cyrillic_bold25), Color(200, 200, 200), TextAlign::CENTER, "TEMP");
          
          // ВЯТЪР - ДЯСНО
          it.printf(240, 60, id(font_bold), Color(100, 200, 255), TextAlign::CENTER, "%.1f", id(weatherwind).state);
          it.printf(240, 110, id(font_cyrillic_bold25), Color(200, 200, 200), TextAlign::CENTER, "m/s");
          
          // Дата долу
          it.strftime(160, 150, id(font_cyrillic), Color(150, 150, 150), TextAlign::CENTER, "%d.%m.%Y", id(ha_time).now());
          
          // Wi-Fi статус - малък в ъгъла
          if (id(wifi_connection) == true) {
            it.image(5, 3, id(connected), Color(0, 220, 0));
          } else {
            it.image(5, 3, id(disconnected), Color(255, 50, 50));
          }

          // Wi-Fi статус
          if (id(wifi_connection) == true) {
            it.image(10, 5, id(connected), Color(0, 220, 0));
          } else {
            it.image(10, 5, id(disconnected), Color(255, 50, 50));
          }


      - id: page1
        lambda: |-
          // Вертикално центриран текст
          it.printf(160, 50, id(font_cyrillic_bold), TextAlign::CENTER, "МОЛЯ");
          it.printf(160, 85, id(font_cyrillic_bold), TextAlign::CENTER, "ЗАТВОРЕТЕ");
          it.printf(160, 120, id(font_cyrillic_bold), TextAlign::CENTER, "ВРАТАТА");
      - id: door_unlocked_page
        lambda: |-
          it.print(120, 50, id(font_cyrillic_bold), Color(255, 0, 0), "ВРАТАТА Е");
          it.print(120, 90, id(font_cyrillic_bold), Color(255, 0, 0), "ОТКЛЮЧЕНА");
          it.image(120, 150, id(image_alert), Color(255, 0, 0));

          // ═══ PIR статус (под WiFi) ═══
          if (id(pir_detected)) {
            // Мигаща анимация при детекция
            if (id(pir_blink_state)) {
              it.image(10, 35, id(pir_active), Color(255, 100, 0));  // Оранжев
            } else {
              it.image(10, 35, id(pir_active), Color(255, 200, 0));  // Жълт
            }
          } else {
            // Статична иконка без движение
            it.image(10, 35, id(pir_idle), Color(100, 100, 100));  // Сив
          }

      # Страница за температура
      - id: weather_temperature_page
        lambda: |-

          // Заглавие
          it.printf(160, 10, id(font_cyrillic_bold25), Color(255, 255, 255), TextAlign::CENTER, "ТЕМПЕРАТУРА");

          // Големи цифри за температурата
          it.printf(160, 120, id(font_bold), Color(255, 180, 0), TextAlign::CENTER, "%.1f°C", id(weather).state);

          // Дата и час в долната част
          it.strftime(160, 150, id(font_cyrillic), Color(150, 150, 150), TextAlign::CENTER, "%H:%M | %d-%m", id(ha_time).now());

          // Wi-Fi статус
          if (id(wifi_connection) == true) {
            it.image(10, 5, id(connected), Color(0, 220, 0));
          } else {
            it.image(10, 5, id(disconnected), Color(255, 50, 50));
          }

          // ═══ PIR статус (под WiFi) ═══
          if (id(pir_detected)) {
            // Мигаща анимация при детекция
            if (id(pir_blink_state)) {
              it.image(10, 35, id(pir_active), Color(255, 100, 0));  // Оранжев
            } else {
              it.image(10, 35, id(pir_active), Color(255, 200, 0));  // Жълт
            }
          } else {
            // Статична иконка без движение
            it.image(10, 35, id(pir_idle), Color(100, 100, 100));  // Сив
          }

      # Страница за вятър
      - id: weather_wind_page
        lambda: |-
          // Заглавие гореcentrирано
          it.printf(160, 10, id(font_cyrillic_bold25), Color(255, 255, 255), TextAlign::CENTER, "ВЯТЪР");
          
          // ГОЛЕМИ цифри за вятъра - ЛЯВО
          it.printf(80, 70, id(font_bold), Color(100, 200, 255), TextAlign::CENTER, "%.1f", id(weatherwind).state);
          it.printf(80, 110, id(font_cyrillic_bold25), Color(100, 200, 255), TextAlign::CENTER, "m/s");
          
          // Икона за вятър - ДЯСНО средата
          it.image(200, 55, id(windy), Color(100, 200, 255));
          
          // Дата и час в долната част
          it.strftime(160, 155, id(font_cyrillic), Color(150, 150, 150), TextAlign::CENTER, "%H:%M | %d.%m", id(ha_time).now());
          
          // Wi-Fi статус - горе ляво (малка икона)
          if (id(wifi_connection) == true) {
            it.image(5, 3, id(connected), Color(0, 220, 0));
          } else {
            it.image(5, 3, id(disconnected), Color(255, 50, 50));
          }
          
          // ═══ PIR статус (под WiFi) ═══
          if (id(pir_detected)) {
            // Мигаща анимация при детекция
            if (id(pir_blink_state)) {
              it.image(10, 35, id(pir_active), Color(255, 100, 0));  // Оранжев
            } else {
              it.image(10, 35, id(pir_active), Color(255, 200, 0));  // Жълт
            }
          } else {
            // Статична иконка без движение
            it.image(10, 35, id(pir_idle), Color(100, 100, 100));  // Сив
          }
      # Страница за общо време
      - id: weather_general_page
        lambda: |-

          // Заглавие
          it.printf(160, 15, id(font_cyrillic_bold25), Color(255, 255, 255), TextAlign::CENTER, "ВРЕМЕ");

          // Голяма икона за времето в центъра
          if (id(weathertxt).state == "cloudy") {
            it.image(80, 50, id(cloudy), Color(200, 200, 200));
          } else if (id(weathertxt).state == "rainy") {
            it.image(80, 50, id(raining), Color(100, 150, 255));
          } else if (id(weathertxt).state == "snowy") {
            it.image(80, 50, id(snow), Color(255, 255, 255));
          } else if (id(weathertxt).state == "partlycloudy") {
            it.image(80, 50, id(partly_cloudy), Color(200, 200, 200));
          } else if (id(weathertxt).state == "clear-night") {
            it.image(80, 50, id(clear_night), Color(120, 140, 255));
          } else if (id(weathertxt).state == "sunny") {
            it.image(80, 50, id(sunny), Color(255, 220, 0));
          } else {
            it.image(80, 50, id(weathercloudyalert), Color(255, 100, 0));
          }

          // Температура и вятър на една страница
          it.printf(240, 70, id(font_cyrillic_bold25), Color(255, 180, 0), "%.1f°C", id(weather).state);
          it.printf(240, 100, id(font_cyrillic_bold25), Color(100, 200, 255), "%.1f m/s", id(weatherwind).state);

          // Дата и час в долната част
          it.strftime(160, 150, id(font_cyrillic), Color(150, 150, 150), TextAlign::CENTER, "%H:%M | %d-%m-%Y", id(ha_time).now());

          // Wi-Fi статус
          if (id(wifi_connection) == true) {
            it.image(10, 5, id(connected), Color(0, 220, 0));
          } else {
            it.image(10, 5, id(disconnected), Color(255, 50, 50));
          }

      # Страница с адрес на сградата
      - id: building_info_page
        lambda: |-
          // Големи букви за адреса в центъра
          it.printf(160, 60, id(font_cyrillic_bold), Color(255, 255, 255), TextAlign::CENTER, "БЛОК 108");
          it.printf(160, 110, id(font_cyrillic_bold), Color(255, 255, 255), TextAlign::CENTER, "ВХ Б");

          // Дата и час в долната част
          it.strftime(160, 150, id(font_cyrillic), Color(150, 150, 150), TextAlign::CENTER, "%H:%M | %d-%m-%Y", id(ha_time).now());

          // Wi-Fi статус В горен ляв ъгъл
          if (id(wifi_connection) == true) {
            it.image(10, 5, id(connected), Color(0, 220, 0));
          } else {
            it.image(10, 5, id(disconnected), Color(255, 50, 50));
          }

          // ═══ PIR статус (под WiFi) ═══
          if (id(pir_detected)) {
            // Мигаща анимация при детекция
            if (id(pir_blink_state)) {
              it.image(10, 35, id(pir_active), Color(255, 100, 0));  // Оранжев
            } else {
              it.image(10, 35, id(pir_active), Color(255, 200, 0));  // Жълт
            }
          } else {
            // Статична иконка без движение
            it.image(10, 35, id(pir_idle), Color(100, 100, 100));  // Сив
          }
      - id: update_progress_page
        lambda: |-

          // Заглавие
          it.printf(160, 15, id(font_cyrillic_bold25), Color(255, 255, 255), TextAlign::CENTER, "АКТУАЛИЗАЦИЯ");

          // Икона за актуализация
          it.image(130, 40, id(update_icon), Color(100, 150, 255));

          // Прогрес бар рамка
          it.rectangle(50, 85, 220, 25, Color(100, 100, 100));
          // Прогрес бар запълване
          it.rectangle(52, 87, ((220-4) * id(update_progress) / 100), 21, Color(0, 200, 0));

          // Процент на прогреса
          it.printf(160, 120, id(font_cyrillic_bold25), Color(255, 255, 255), TextAlign::CENTER, "%d%%", id(update_progress));

          // Допълнителен текст
          it.printf(160, 145, id(font_cyrillic), Color(150, 150, 150), TextAlign::CENTER, "Моля изчакайте...");

          // Wi-Fi статус В горен ляв ъгъл
          if (id(wifi_connection) == true) {
            it.image(10, 5, id(connected), Color(0, 220, 0));
          } else {
            it.image(10, 5, id(disconnected), Color(255, 50, 50));
          }
      - id: qr_code_page
        lambda: |-
          // Получаваме размера на QR кода
          auto qr_size = id(qr_code_unlck).get_size();
          
          // Изчисляваме максимален мащаб за дисплея
          int max_scale_width = (it.get_width() - 40) / qr_size;  // 40px отстъп от краищата
          int max_scale_height = (it.get_height() - 80) / qr_size; // 80px за заглавие и долен отстъп
          
          // Избираме по-малкия мащаб, но поне 3
          int scale = std::max(3, std::min(max_scale_width, max_scale_height));
          
          // Изчисляваме финалния размер
          auto final_size = qr_size * scale;
          
          // Центрираме QR кода
          auto x = (it.get_width() / 2) - (final_size / 2);
          auto y = ((it.get_height() + 40) / 2) - (final_size / 2); // +40 за да отчетем заглавието
          
          // Рисуваме бял фон около QR кода за по-добър контраст
          it.filled_rectangle(x - 10, y - 10, final_size + 20, final_size + 20, Color(255, 255, 255));
          
          // Рисуваме QR кода с черен цвят върху белия фон
          it.qr_code(x, y, id(qr_code_unlck), Color(0, 0, 0), scale);
          
          // Допълнителна информация под QR кода (опционално)
          it.printf(160, y + final_size + 15, id(font_bold), Color(255, 255, 255), TextAlign::CENTER, "unlck.app");  
      - id: aqi_page
        lambda: |-
          // Определяне на цвят според AQI стойността
          Color aqi_color;
          std::string aqi_status;
          
          float aqi = id(aqi_index).state;
          
          if (aqi <= 50) {
            aqi_color = Color(0, 200, 0);        // Зелено
            aqi_status = "добре";
          } else if (aqi <= 100) {
            aqi_color = Color(255, 255, 0);      // Жълто
            aqi_status = "умерен";
          } else if (aqi <= 150) {
            aqi_color = Color(255, 165, 0);      // Оранжево
            aqi_status = "нездравословна";
          } else if (aqi <= 200) {
            aqi_color = Color(255, 0, 0);        // Червено
            aqi_status = "нездравословен";
          } else if (aqi <= 300) {
            aqi_color = Color(128, 0, 128);      // Лилаво
            aqi_status = "много нездравословно";
          } else {
            aqi_color = Color(128, 0, 0);        // Тъмночервено
            aqi_status = "опасен";
          }

          // Заглавие
          it.printf(160, 15, id(font_cyrillic_bold25), Color(255, 255, 255), TextAlign::CENTER, "КАЧЕСТВО ВЪЗДУХ");

          // Голям AQI индекс в центъра
          it.printf(160, 70, id(font_bold), aqi_color, TextAlign::CENTER, "%.0f", aqi);
          
          // Текстов статус под числото
          it.printf(160, 115, id(font_cyrillic_bold25), aqi_color, TextAlign::CENTER, "%s", aqi_status.c_str());

          // Дата и час в долната част
          it.strftime(160, 150, id(font_cyrillic), Color(150, 150, 150), TextAlign::CENTER, "%H:%M | %d-%m", id(ha_time).now());

          // Wi-Fi статус
          if (id(wifi_connection) == true) {
            it.image(10, 5, id(connected), Color(0, 220, 0));
          } else {
            it.image(10, 5, id(disconnected), Color(255, 50, 50));
          }

          // ═══ PIR статус (под WiFi) ═══
          if (id(pir_detected)) {
            // Мигаща анимация при детекция
            if (id(pir_blink_state)) {
              it.image(10, 35, id(pir_active), Color(255, 100, 0));  // Оранжев
            } else {
              it.image(10, 35, id(pir_active), Color(255, 200, 0));  // Жълт
            }
          } else {
            // Статична иконка без движение
            it.image(10, 35, id(pir_idle), Color(100, 100, 100));  // Сив
          }
      - id: clock_page
        lambda: |-
          // САМО ЧАС - максимално голям
          it.strftime(160, 85, id(font_bold), Color(255, 255, 255), TextAlign::CENTER, "%H:%M", id(ha_time).now());

globals: ##to set default reboot behavior
  - id: wifi_connection
    type: bool
    restore_value: no
    initial_value: "false"

  # Глобална променлива за проследяване на текущата страница
  - id: current_page_index
    type: int
    restore_value: no
    initial_value: "0"
  # Глобална променлива за проследяване на прогреса на актуализацията
  - id: update_progress
    type: int
    restore_value: no
    initial_value: "0"

  # Флаг за активна актуализация
  - id: update_in_progress
    type: bool
    restore_value: no
    initial_value: "false"
  
  - id: pir_detected  # Нов флаг за PIR
    type: bool
    restore_value: no
    initial_value: 'false'
  
  - id: pir_blink_state  # За мигащ ефект
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 10s
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - lambda: |-
                id(wifi_connection) = true;
          else:
            - lambda: |-
                id(wifi_connection) = false;
      - lambda: |-
          // Проверка дали вратата е отворена
          if (id(buildingdoor).state == "true") {
            // Вратата е отворена, спри ротацията
            id(current_page_index) = 0;
          } else {
            // Вратата е затворена, продължи ротацията
            if (id(current_page_index) == 0) {
              id(current_page_index) = 1;
            }
          }

  - interval: 500ms  # Мига на всеки 500ms
    then:
      - lambda: |-
          if (id(pir_detected)) {
            id(pir_blink_state) = !id(pir_blink_state);
          } else {
            id(pir_blink_state) = false;
          }        

  # Автоматично ротиране на страниците за времето
  - interval: 8s
    then:
      - lambda: |-
          // Спри ротацията ако има актуализация в ход
          if (id(update_in_progress) == true) {
            id(displayST).show_page(id(update_progress_page));
            return;
          }

          // Ротиране само ако вратата е затворена (не е на page1)
          if (id(vrata_sboard).state == false) {
            int next_page = (id(current_page_index) + 1) % 6; // 6 страници общо
            id(current_page_index) = next_page;
            
            switch(next_page) {
              case 0:
                id(displayST).show_page(id(clock_page));
                break;
              case 1:
                id(displayST).show_page(id(weather_temperature_page));
                break;
              case 2:
                id(displayST).show_page(id(weather_wind_page));
                break;
              case 3:
                id(displayST).show_page(id(building_info_page));
                break;
              case 4:
                id(displayST).show_page(id(aqi_page));
                break;  
            }      
            // Запомни текущата страница
            id(current_page_index) = next_page;

          }
